services:
  postgres:
    image: postgres:16
    container_name: imessage-to-sqldb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: imessage_to_sqldb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imessage_to_sqldb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
